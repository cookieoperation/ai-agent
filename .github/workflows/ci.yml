name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      API_KEY: ${{ secrets.api_key }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile Python files
        run: python -m py_compile ai-agent/server/server.py ai-agent/server/executor.py ai-agent/server/agent.py ai-agent/server/tools.py
